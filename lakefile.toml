name = "Statlib"
defaultTargets = ["Statlib"]
version = "0.1.0"
keywords = ["probability", "statistics", "lean"]
packagesDir = ".lake/packages"
lintDriver = "batteries/runLinter"

[leanOptions]
autoImplicit = true
# Enable all mathlib linters: automatically matches what mathlib uses.
weak.linter.mathlibStandardSet = true

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4"
rev = "4a7edd35ec64de7117995da659e9d4d80e6cca19"

[[require]]
name = "subverso"
git = "https://github.com/leanprover/subverso"
rev = "main"

[[lean_lib]]
name = "Statlib"
